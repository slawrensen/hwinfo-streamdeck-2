# Static + unit verification on every push/PR. The e2e suites need a live
# HWiNFO shared-memory mapping (and the resilience/gadget fakes need real
# Win32 named objects + HKCU), so they stay local: `npm run suite:full`.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # windows-latest ships the MSVC toolset node-gyp expects.
      - run: npm run build:native
      - run: npm run build
